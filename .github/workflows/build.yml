name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build filter rules
        run: npm run build:rules

      - name: Build extension
        run: npm run build:ext

      - name: Package extension ZIP
        run: |
          mkdir -p release
          zip -r release/nullify-${{ github.ref_name || 'dev' }}.zip \
            manifest.json \
            assets/ \
            rules/ \
            dist/ \
            src/popup/popup.html \
            src/popup/popup.css \
            src/options/options.html \
            src/options/options.css \
            -x "*.map"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nullify-extension
          path: release/*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          generate_release_notes: true
          body: |
            ## Nullify ${{ github.ref_name }}

            ### Install
            1. Download `nullify-${{ github.ref_name }}.zip` below
            2. Unzip to a folder
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder
            5. Done! Nullify is active.
